<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>BT4 Groot2 Web Monitor</title>

  <style>
    :root {
      --bg0: #020617;
      --bg1: #07111f;
      --bg2: #0f172a;

      --panel: rgba(8, 16, 32, 0.82);
      --panel-soft: rgba(15, 23, 42, 0.76);

      --card-bg-a: rgba(18, 30, 52, 0.98);
      --card-bg-b: rgba(9, 16, 31, 0.98);

      --text: #f8fafc;
      --muted: #9ca3af;
      --muted2: #64748b;

      --border: rgba(148, 163, 184, 0.20);
      --border-strong: rgba(148, 163, 184, 0.34);

      --idle: #64748b;
      --running: #22d3ee;
      --success: #34d399;
      --failure: #fb7185;
      --skipped: #fbbf24;
      --purple: #a78bfa;

      --tree-line: rgba(148, 163, 184, 0.34);
      --tree-line-active: rgba(34, 211, 238, 0.80);

      --shadow-card: 0 22px 48px rgba(0, 0, 0, 0.38);
      --shadow-soft: 0 12px 30px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      color: var(--text);
      font-family: Consolas, "Microsoft YaHei", monospace;
      background:
        radial-gradient(circle at 10% 8%, rgba(34, 211, 238, 0.20), transparent 28%),
        radial-gradient(circle at 78% 14%, rgba(167, 139, 250, 0.16), transparent 32%),
        radial-gradient(circle at 72% 88%, rgba(52, 211, 153, 0.10), transparent 30%),
        linear-gradient(135deg, #020617 0%, #07111f 45%, #020617 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 430px;
    }

    #workspace {
      position: relative;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      min-width: 0;
      min-height: 0;
      height: 100vh;
      border-right: 1px solid var(--border);
    }

    #header {
      padding: 18px 22px 14px;
      background: rgba(2, 6, 23, 0.72);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
    }

    #titleRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 14px;
    }

    #title {
      font-size: 25px;
      font-weight: 900;
      letter-spacing: 0.4px;
      background: linear-gradient(90deg, #e0f2fe, #67e8f9, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
    }

    #connBadge {
      min-width: 96px;
      text-align: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.28);
      color: var(--muted);
      font-weight: 800;
      font-size: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    #connBadge.connected {
      color: #bbf7d0;
      border-color: rgba(52, 211, 153, 0.62);
      box-shadow:
        0 0 24px rgba(52, 211, 153, 0.20),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    #summary {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
    }

    .summary-card {
      position: relative;
      overflow: hidden;
      padding: 11px 13px;
      min-height: 72px;
      border-radius: 16px;
      background:
        linear-gradient(145deg, rgba(30, 41, 59, 0.94), rgba(10, 18, 34, 0.95));
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: var(--shadow-soft);
    }

    .summary-card::after {
      content: "";
      position: absolute;
      right: -24px;
      top: -24px;
      width: 76px;
      height: 76px;
      border-radius: 999px;
      background: rgba(34, 211, 238, 0.08);
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .summary-value {
      position: relative;
      z-index: 1;
      font-weight: 900;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      background: rgba(15, 23, 42, 0.62);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(14px);
    }

    button {
      padding: 8px 13px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background:
        linear-gradient(180deg, rgba(30, 41, 59, 0.96), rgba(10, 18, 34, 0.96));
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      transition: 0.14s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(34, 211, 238, 0.50);
      box-shadow:
        0 0 20px rgba(34, 211, 238, 0.14),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }

    #searchBox {
      width: 300px;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(2, 6, 23, 0.78);
      color: var(--text);
      outline: none;
      font-family: inherit;
    }

    #searchBox:focus {
      border-color: rgba(34, 211, 238, 0.72);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.12);
    }

    #canvasWrap {
      position: relative;
      overflow: auto;
      min-height: 0;
      height: 100%;
      padding: 40px 56px 140px;
      cursor: grab;
      scrollbar-color: rgba(34, 211, 238, 0.55) rgba(15, 23, 42, 0.8);
      scrollbar-width: thin;
    }

    #canvasWrap:active {
      cursor: grabbing;
    }

    #canvasWrap::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    #canvasWrap::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.55);
    }

    #canvasWrap::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(34, 211, 238, 0.70), rgba(167, 139, 250, 0.56));
      border-radius: 999px;
    }

    #treeCanvas {
      position: relative;
      min-width: 1280px;
      width: max-content;
      min-height: 100%;
      height: max-content;
      padding-bottom: 220px;
    }

    #nodeLayer {
      width: max-content;
      min-width: 980px;
      padding: 10px 0 180px 40px;
    }

    .tree-node {
      position: relative;
      display: block;
    }

    .tree-node.hidden {
      display: none !important;
    }

    .children {
      position: relative;
      margin-left: 86px;
      padding-left: 34px;
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .children::before {
      content: "";
      position: absolute;
      left: 0;
      top: -14px;
      bottom: 48px;
      width: 2px;
      background:
        linear-gradient(
          180deg,
          rgba(148, 163, 184, 0.42),
          rgba(148, 163, 184, 0.18)
        );
      border-radius: 999px;
    }

    .tree-node.active-ancestor > .children::before {
      background:
        linear-gradient(
          180deg,
          rgba(34, 211, 238, 0.88),
          rgba(34, 211, 238, 0.28)
        );
      box-shadow: 0 0 12px rgba(34, 211, 238, 0.30);
    }

    .children > .tree-node::before {
      content: "";
      position: absolute;
      left: -34px;
      top: 48px;
      width: 34px;
      height: 2px;
      background: var(--tree-line);
      border-radius: 999px;
    }

    .children > .tree-node.active-ancestor::before,
    .children > .tree-node.current-node-block::before {
      background: var(--tree-line-active);
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.52);
    }

    .bt-card {
      position: relative;
      width: 380px;
      min-height: 96px;
      border-radius: 22px;
      padding: 15px 16px 13px;
      background:
        radial-gradient(circle at 92% 10%, rgba(34, 211, 238, 0.07), transparent 32%),
        linear-gradient(145deg, var(--card-bg-a), var(--card-bg-b));
      border: 1px solid rgba(148, 163, 184, 0.22);
      box-shadow:
        var(--shadow-card),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
    }

    .bt-card:hover {
      transform: translateY(-3px);
      border-color: rgba(34, 211, 238, 0.46);
      box-shadow:
        0 24px 52px rgba(0, 0, 0, 0.46),
        0 0 30px rgba(34, 211, 238, 0.13),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .bt-card.current {
      outline: 2px solid rgba(255, 255, 255, 0.95);
      transform: translateY(-4px) scale(1.025);
      box-shadow:
        0 0 0 5px rgba(255, 255, 255, 0.08),
        0 0 48px rgba(34, 211, 238, 0.38),
        0 26px 66px rgba(0, 0, 0, 0.50);
      animation: currentSoftGlow 1.4s ease-in-out infinite;
    }

    @keyframes currentSoftGlow {
      0%, 100% {
        box-shadow:
          0 0 0 5px rgba(255, 255, 255, 0.08),
          0 0 38px rgba(34, 211, 238, 0.28),
          0 24px 60px rgba(0, 0, 0, 0.48);
      }

      50% {
        box-shadow:
          0 0 0 7px rgba(255, 255, 255, 0.10),
          0 0 62px rgba(34, 211, 238, 0.50),
          0 28px 70px rgba(0, 0, 0, 0.54);
      }
    }

    .bt-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 22px;
      pointer-events: none;
      opacity: 0.96;
      border-left: 7px solid var(--idle);
    }

    .bt-card.node-RUNNING {
      border-color: rgba(34, 211, 238, 0.86);
      background:
        radial-gradient(circle at 90% 15%, rgba(34, 211, 238, 0.24), transparent 34%),
        linear-gradient(145deg, rgba(8, 47, 73, 0.98), rgba(9, 16, 31, 0.98));
      animation: pulseRunning 1.05s infinite ease-in-out;
    }

    .bt-card.node-RUNNING.current {
      animation:
        pulseRunning 1.05s infinite ease-in-out,
        currentSoftGlow 1.4s ease-in-out infinite;
    }

    .bt-card.node-RUNNING::before {
      border-left-color: var(--running);
    }

    .bt-card.node-SUCCESS,
    .bt-card.node-IDLE_FROM_SUCCESS {
      border-color: rgba(52, 211, 153, 0.60);
      background:
        radial-gradient(circle at 90% 15%, rgba(52, 211, 153, 0.18), transparent 34%),
        linear-gradient(145deg, rgba(20, 83, 45, 0.50), rgba(9, 16, 31, 0.98));
    }

    .bt-card.node-SUCCESS::before,
    .bt-card.node-IDLE_FROM_SUCCESS::before {
      border-left-color: var(--success);
    }

    .bt-card.node-FAILURE,
    .bt-card.node-IDLE_FROM_FAILURE {
      border-color: rgba(251, 113, 133, 0.82);
      background:
        radial-gradient(circle at 90% 15%, rgba(251, 113, 133, 0.23), transparent 34%),
        linear-gradient(145deg, rgba(127, 29, 29, 0.64), rgba(9, 16, 31, 0.98));
    }

    .bt-card.node-FAILURE::before,
    .bt-card.node-IDLE_FROM_FAILURE::before {
      border-left-color: var(--failure);
    }

    .bt-card.node-SKIPPED,
    .bt-card.node-IDLE_FROM_SKIPPED {
      border-color: rgba(251, 191, 36, 0.62);
      background:
        radial-gradient(circle at 90% 15%, rgba(251, 191, 36, 0.18), transparent 34%),
        linear-gradient(145deg, rgba(113, 63, 18, 0.56), rgba(9, 16, 31, 0.98));
    }

    .bt-card.node-SKIPPED::before,
    .bt-card.node-IDLE_FROM_SKIPPED::before {
      border-left-color: var(--skipped);
    }

    @keyframes pulseRunning {
      0%, 100% {
        box-shadow:
          0 0 0 0 rgba(34, 211, 238, 0.08),
          0 0 36px rgba(34, 211, 238, 0.24),
          0 22px 50px rgba(0, 0, 0, 0.38);
      }

      50% {
        box-shadow:
          0 0 0 7px rgba(34, 211, 238, 0.11),
          0 0 58px rgba(34, 211, 238, 0.40),
          0 26px 64px rgba(0, 0, 0, 0.48);
      }
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .node-icon {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(2, 6, 23, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.25);
      font-size: 18px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .node-info {
      flex: 1;
      min-width: 0;
    }

    .node-name {
      font-size: 15px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .node-kind {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      border: 1px solid rgba(148, 163, 184, 0.25);
      color: #cbd5e1;
      background: rgba(100, 116, 139, 0.16);
    }

    .badge-RUNNING {
      color: #a5f3fc;
      background: rgba(34, 211, 238, 0.14);
      border-color: rgba(34, 211, 238, 0.52);
    }

    .badge-SUCCESS,
    .badge-IDLE_FROM_SUCCESS {
      color: #bbf7d0;
      background: rgba(52, 211, 153, 0.14);
      border-color: rgba(52, 211, 153, 0.48);
    }

    .badge-FAILURE,
    .badge-IDLE_FROM_FAILURE {
      color: #fecdd3;
      background: rgba(251, 113, 133, 0.14);
      border-color: rgba(251, 113, 133, 0.48);
    }

    .badge-SKIPPED,
    .badge-IDLE_FROM_SKIPPED {
      color: #fde68a;
      background: rgba(251, 191, 36, 0.14);
      border-color: rgba(251, 191, 36, 0.48);
    }

    .card-bottom {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .uid-chip {
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(2, 6, 23, 0.62);
      border: 1px solid rgba(148, 163, 184, 0.16);
    }

    #side {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 0;
      height: 100vh;
      background: rgba(2, 6, 23, 0.72);
      backdrop-filter: blur(16px);
    }

    #sideHeader {
      padding: 18px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(2, 6, 23, 0.62);
    }

    #sideTitle {
      font-size: 18px;
      font-weight: 900;
    }

    #sideSub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }

    #legend {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--idle);
    }

    .dot.running { background: var(--running); }
    .dot.success { background: var(--success); }
    .dot.failure { background: var(--failure); }
    .dot.skipped { background: var(--skipped); }

    #logContent {
      overflow: auto;
      min-height: 0;
      padding: 14px 16px 24px;
      scrollbar-color: rgba(34, 211, 238, 0.45) rgba(15, 23, 42, 0.8);
      scrollbar-width: thin;
    }

    .log-line {
      position: relative;
      margin-left: 10px;
      margin-bottom: 12px;
      padding: 10px 12px 10px 16px;
      border-radius: 14px;
      background: rgba(30, 41, 59, 0.68);
      border: 1px solid rgba(148, 163, 184, 0.14);
      box-shadow: 0 10px 24px rgba(0,0,0,0.16);
      font-size: 13px;
    }

    .log-line::before {
      content: "";
      position: absolute;
      left: -16px;
      top: 16px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--idle);
      box-shadow: 0 0 0 4px rgba(100, 116, 139, 0.13);
    }

    .log-line::after {
      content: "";
      position: absolute;
      left: -12px;
      top: 28px;
      bottom: -20px;
      width: 2px;
      background: rgba(71, 85, 105, 0.42);
    }

    .log-RUNNING::before {
      background: var(--running);
      box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.12);
    }

    .log-SUCCESS::before,
    .log-IDLE_FROM_SUCCESS::before {
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.12);
    }

    .log-FAILURE::before,
    .log-IDLE_FROM_FAILURE::before {
      background: var(--failure);
      box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.12);
    }

    .log-SKIPPED::before,
    .log-IDLE_FROM_SKIPPED::before {
      background: var(--skipped);
      box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.12);
    }

    .log-time {
      color: var(--muted);
      font-size: 12px;
    }

    .log-main {
      margin-top: 4px;
      line-height: 1.45;
    }

    .log-name {
      font-weight: 900;
      color: #f8fafc;
    }

    .log-status {
      font-weight: 900;
    }

    .log-RUNNING .log-status { color: var(--running); }
    .log-SUCCESS .log-status,
    .log-IDLE_FROM_SUCCESS .log-status { color: var(--success); }
    .log-FAILURE .log-status,
    .log-IDLE_FROM_FAILURE .log-status { color: var(--failure); }
    .log-SKIPPED .log-status,
    .log-IDLE_FROM_SKIPPED .log-status { color: var(--skipped); }

    #bottomStatus {
      position: fixed;
      left: 18px;
      bottom: 14px;
      z-index: 50;
      padding: 7px 13px;
      border-radius: 999px;
      color: #cbd5e1;
      font-size: 12px;
      background: rgba(2, 6, 23, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.22);
      backdrop-filter: blur(10px);
    }

    @media (max-width: 1300px) {
      body {
        grid-template-columns: minmax(0, 1fr) 390px;
      }

      #summary {
        grid-template-columns: repeat(3, minmax(120px, 1fr));
      }

      .bt-card {
        width: 340px;
      }
    }
  </style>
</head>

<body>
  <main id="workspace">
    <header id="header">
      <div id="titleRow">
        <div>
          <div id="title">BT4 Groot2 Web Monitor</div>
          <div id="subtitle">BehaviorTree.CPP 4.x · Groot2Publisher Bridge · Runtime Visualization</div>
        </div>
        <div id="connBadge">未连接</div>
      </div>

      <section id="summary">
        <div class="summary-card">
          <div class="summary-label">当前执行节点</div>
          <div class="summary-value" id="currentNode">-</div>
        </div>

        <div class="summary-card">
          <div class="summary-label">当前状态</div>
          <div class="summary-value" id="currentStatus">-</div>
        </div>

        <div class="summary-card">
          <div class="summary-label">最后失败节点</div>
          <div class="summary-value" id="lastFailure">-</div>
        </div>

        <div class="summary-card">
          <div class="summary-label">节点数量</div>
          <div class="summary-value" id="nodeCount">0</div>
        </div>

        <div class="summary-card">
          <div class="summary-label">最后更新时间</div>
          <div class="summary-value" id="lastUpdate">-</div>
        </div>
      </section>
    </header>

    <section id="toolbar">
      <button onclick="clearLog()">清空日志</button>
      <button onclick="resetHighlight()">取消高亮</button>
      <button onclick="scrollToCurrent()">定位当前节点</button>
      <button onclick="toggleAutoCenter()" id="autoCenterBtn">自动居中：开</button>
      <button onclick="fitToRoot()">回到根节点</button>
      <input id="searchBox" placeholder="搜索节点名 / 类型 / uid" oninput="filterNodes()" />
    </section>

    <section id="canvasWrap">
      <div id="treeCanvas">
        <div id="nodeLayer">等待行为树数据...</div>
      </div>
    </section>
  </main>

  <aside id="side">
    <div id="sideHeader">
      <div id="sideTitle">执行时间线</div>
      <div id="sideSub">最新状态变化在最上方</div>

      <div id="legend">
        <div class="legend-item"><span class="dot running"></span> RUNNING</div>
        <div class="legend-item"><span class="dot success"></span> SUCCESS</div>
        <div class="legend-item"><span class="dot failure"></span> FAILURE</div>
        <div class="legend-item"><span class="dot skipped"></span> SKIPPED</div>
      </div>
    </div>

    <div id="logContent"></div>
  </aside>

  <div id="bottomStatus">未连接</div>

  <script>
    const nodeMap = new Map();
    const blockMap = new Map();
    const nodeNameMap = new Map();
    const nodeStatusMap = new Map();
    const parentMap = new Map();

    let lastCurrentUid = null;
    let totalNodeCount = 0;

    let autoCenterEnabled = true;
    let centerAnimationId = null;
    let centerTarget = null;
    let lastAutoCenterTime = 0;

    let userScrolling = false;
    let userScrollTimer = null;

    let isPanning = false;
    let panStartX = 0;
    let panStartY = 0;
    let panStartScrollLeft = 0;
    let panStartScrollTop = 0;

    const nodeLayer = document.getElementById("nodeLayer");
    const canvasWrap = document.getElementById("canvasWrap");

    const logContent = document.getElementById("logContent");
    const bottomStatus = document.getElementById("bottomStatus");
    const connBadge = document.getElementById("connBadge");

    const currentNodeEl = document.getElementById("currentNode");
    const currentStatusEl = document.getElementById("currentStatus");
    const lastFailureEl = document.getElementById("lastFailure");
    const nodeCountEl = document.getElementById("nodeCount");
    const lastUpdateEl = document.getElementById("lastUpdate");
    const searchBox = document.getElementById("searchBox");

    function iconForNode(node) {
      const name = `${node.kind || ""} ${node.name || ""}`.toLowerCase();

      if (name.includes("sequence")) return "➡";
      if (name.includes("fallback")) return "◇";
      if (name.includes("parallel")) return "∥";
      if (name.includes("condition") || name.includes("is")) return "?";
      if (name.includes("sleep")) return "⏱";
      if (name.includes("move")) return "↗";
      if (name.includes("jog")) return "▶";

      return "●";
    }

    function cleanStatus(status) {
      return String(status || "IDLE").replaceAll(" ", "_");
    }

    function renderNodeBlock(node, parentUid = null) {
      totalNodeCount++;

      const block = document.createElement("div");
      block.className = "tree-node";
      block.dataset.uid = node.uid;
      block.dataset.name = node.name || "";
      block.dataset.kind = node.kind || "";

      const card = document.createElement("div");
      card.className = "bt-card node-IDLE";
      card.dataset.uid = node.uid;

      const top = document.createElement("div");
      top.className = "card-top";

      const icon = document.createElement("div");
      icon.className = "node-icon";
      icon.textContent = iconForNode(node);

      const info = document.createElement("div");
      info.className = "node-info";

      const name = document.createElement("div");
      name.className = "node-name";
      name.textContent = node.name || "unnamed";

      const kind = document.createElement("div");
      kind.className = "node-kind";
      kind.textContent = `[${node.kind}]`;

      info.appendChild(name);
      info.appendChild(kind);

      const badge = document.createElement("div");
      badge.className = "status-badge badge-IDLE";
      badge.dataset.role = "status";
      badge.textContent = "IDLE";

      top.appendChild(icon);
      top.appendChild(info);
      top.appendChild(badge);

      const bottom = document.createElement("div");
      bottom.className = "card-bottom";
      bottom.innerHTML = `
        <span class="uid-chip">uid=${node.uid}</span>
        <span data-role="time">last: -</span>
      `;

      card.appendChild(top);
      card.appendChild(bottom);
      block.appendChild(card);

      nodeMap.set(Number(node.uid), card);
      blockMap.set(Number(node.uid), block);
      nodeNameMap.set(Number(node.uid), node.name || `uid=${node.uid}`);
      nodeStatusMap.set(Number(node.uid), "IDLE");

      if (parentUid !== null) {
        parentMap.set(Number(node.uid), Number(parentUid));
      }

      if (node.children && node.children.length > 0) {
        const children = document.createElement("div");
        children.className = "children";

        for (const child of node.children) {
          children.appendChild(renderNodeBlock(child, node.uid));
        }

        block.appendChild(children);
      }

      return block;
    }

    function renderTree(root) {
      nodeMap.clear();
      blockMap.clear();
      nodeNameMap.clear();
      nodeStatusMap.clear();
      parentMap.clear();

      totalNodeCount = 0;
      lastCurrentUid = null;

      nodeLayer.innerHTML = "";
      logContent.innerHTML = "";

      nodeLayer.appendChild(renderNodeBlock(root));

      nodeCountEl.textContent = String(totalNodeCount);
      currentNodeEl.textContent = "-";
      currentStatusEl.textContent = "-";
      lastFailureEl.textContent = "-";
      lastUpdateEl.textContent = "-";

      requestAnimationFrame(() => {
        nodeLayer.style.minHeight = nodeLayer.scrollHeight + 260 + "px";
        fitToRoot();
      });
    }

    function clearActivePath() {
      for (const block of blockMap.values()) {
        block.classList.remove("active-ancestor", "current-node-block");
      }
    }

    function markActivePath(uid) {
      clearActivePath();

      let current = Number(uid);

      const currentBlock = blockMap.get(current);
      if (currentBlock) {
        currentBlock.classList.add("current-node-block");
      }

      while (parentMap.has(current)) {
        const parentUid = parentMap.get(current);
        const parentBlock = blockMap.get(parentUid);

        if (parentBlock) {
          parentBlock.classList.add("active-ancestor");
        }

        current = parentUid;
      }
    }

    function setCurrentNode(uid, status) {
      uid = Number(uid);

      if (lastCurrentUid !== null) {
        const oldCard = nodeMap.get(lastCurrentUid);
        if (oldCard) {
          oldCard.classList.remove("current");
        }
      }

      const card = nodeMap.get(uid);
      if (!card) return;

      card.classList.add("current");
      lastCurrentUid = uid;

      const name = nodeNameMap.get(uid) || `uid=${uid}`;

      currentNodeEl.textContent = `${name} (${uid})`;
      currentStatusEl.textContent = status;

      markActivePath(uid);

      if (autoCenterEnabled && !userScrolling) {
        centerCurrentNodeSmooth(card);
      }
    }

    function centerCurrentNodeSmooth(card) {
      if (!card) return;

      const now = performance.now();

      if (now - lastAutoCenterTime < 120) {
        centerTarget = card;
        return;
      }

      lastAutoCenterTime = now;
      centerTarget = card;

      if (centerAnimationId !== null) {
        cancelAnimationFrame(centerAnimationId);
        centerAnimationId = null;
      }

      const wrapRect = canvasWrap.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();

      const startLeft = canvasWrap.scrollLeft;
      const startTop = canvasWrap.scrollTop;

      const cardCenterX = cardRect.left - wrapRect.left + startLeft + cardRect.width / 2;
      const cardCenterY = cardRect.top - wrapRect.top + startTop + cardRect.height / 2;

      const maxTop = Math.max(0, canvasWrap.scrollHeight - wrapRect.height);
      const maxLeft = Math.max(0, canvasWrap.scrollWidth - wrapRect.width);

      const targetLeft = Math.min(maxLeft, Math.max(0, cardCenterX - wrapRect.width / 2));
      const targetTop = Math.min(maxTop, Math.max(0, cardCenterY - wrapRect.height / 2));

      const distance = Math.hypot(targetLeft - startLeft, targetTop - startTop);
      const duration = Math.min(1200, Math.max(600, distance * 0.45));

      const startTime = performance.now();

      function easeInOutCubic(t) {
        return t < 0.5
          ? 4 * t * t * t
          : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function animate(time) {
        const elapsed = time - startTime;
        const t = Math.min(1, elapsed / duration);
        const eased = easeInOutCubic(t);

        canvasWrap.scrollLeft = startLeft + (targetLeft - startLeft) * eased;
        canvasWrap.scrollTop = startTop + (targetTop - startTop) * eased;

        if (t < 1) {
          centerAnimationId = requestAnimationFrame(animate);
        } else {
          centerAnimationId = null;

          if (centerTarget && centerTarget !== card) {
            const nextTarget = centerTarget;
            centerTarget = null;
            centerCurrentNodeSmooth(nextTarget);
          }
        }
      }

      centerAnimationId = requestAnimationFrame(animate);
    }

    function scrollToCurrent() {
      if (lastCurrentUid === null) return;

      const card = nodeMap.get(lastCurrentUid);
      if (!card) return;

      centerCurrentNodeSmooth(card);
    }

    function toggleAutoCenter() {
      autoCenterEnabled = !autoCenterEnabled;

      const btn = document.getElementById("autoCenterBtn");
      btn.textContent = autoCenterEnabled ? "自动居中：开" : "自动居中：关";

      if (autoCenterEnabled && lastCurrentUid !== null) {
        const card = nodeMap.get(lastCurrentUid);
        centerCurrentNodeSmooth(card);
      }
    }

    function fitToRoot() {
      const firstCard = nodeLayer.querySelector(".bt-card");

      if (!firstCard) {
        canvasWrap.scrollTo({
          left: 0,
          top: 0,
          behavior: "smooth"
        });
        return;
      }

      requestAnimationFrame(() => {
        const wrapRect = canvasWrap.getBoundingClientRect();
        const cardRect = firstCard.getBoundingClientRect();

        const currentLeft = canvasWrap.scrollLeft;
        const cardCenterX = cardRect.left - wrapRect.left + currentLeft + cardRect.width / 2;
        const targetLeft = Math.max(0, cardCenterX - wrapRect.width / 2);

        canvasWrap.scrollTo({
          left: targetLeft,
          top: 0,
          behavior: "smooth"
        });
      });
    }

    function applyStatus(uid, status, timestampMs) {
      uid = Number(uid);
      status = cleanStatus(status);

      const card = nodeMap.get(uid);
      if (!card) return;

      const oldStatus = nodeStatusMap.get(uid);
      nodeStatusMap.set(uid, status);

      card.classList.remove(
        "node-IDLE",
        "node-RUNNING",
        "node-SUCCESS",
        "node-FAILURE",
        "node-SKIPPED",
        "node-IDLE_FROM_RUNNING",
        "node-IDLE_FROM_SUCCESS",
        "node-IDLE_FROM_FAILURE",
        "node-IDLE_FROM_SKIPPED"
      );

      card.classList.add("node-" + status);

      const badge = card.querySelector('[data-role="status"]');
      if (badge) {
        badge.className = "status-badge badge-" + status;
        badge.textContent = status;
      }

      const time = new Date(timestampMs || Date.now()).toLocaleTimeString();

      const timeEl = card.querySelector('[data-role="time"]');
      if (timeEl) {
        timeEl.textContent = `last: ${time}`;
      }

      const name = nodeNameMap.get(uid) || `uid=${uid}`;
      lastUpdateEl.textContent = time;

      if (
        status === "RUNNING" ||
        status === "FAILURE" ||
        status === "IDLE_FROM_FAILURE"
      ) {
        setCurrentNode(uid, status);
      }

      if (status === "FAILURE" || status === "IDLE_FROM_FAILURE") {
        lastFailureEl.textContent = `${name} (${uid})`;
      }

      if (oldStatus !== status) {
        addLogLine(time, uid, name, status);
      }
    }

    function addLogLine(time, uid, name, status) {
      const line = document.createElement("div");
      line.className = "log-line log-" + status;

      line.innerHTML = `
        <div class="log-time">${escapeHtml(time)} · uid=${uid}</div>
        <div class="log-main">
          <span class="log-name">${escapeHtml(name)}</span>
          <span> → </span>
          <span class="log-status">${escapeHtml(status)}</span>
        </div>
      `;

      logContent.prepend(line);

      while (logContent.children.length > 800) {
        logContent.removeChild(logContent.lastChild);
      }
    }

    function handleMessage(msg) {
      if (msg.type === "tree") {
        renderTree(msg.root);
        bottomStatus.textContent = "已加载行为树";
      }

      if (msg.type === "status") {
        applyStatus(msg.uid, msg.status, msg.timestamp_ms);
      }

      if (msg.type === "bridge_status") {
        bottomStatus.textContent = msg.status + ": " + msg.message;
      }
    }

    function connect() {
      const ws = new WebSocket(`ws://${location.host}/ws/viewer`);

      ws.onopen = () => {
        bottomStatus.textContent = "网页 WebSocket 已连接";
        connBadge.textContent = "已连接";
        connBadge.classList.add("connected");
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          handleMessage(msg);
        } catch (e) {
          console.error(e);
        }
      };

      ws.onclose = () => {
        bottomStatus.textContent = "网页连接断开，2 秒后重连";
        connBadge.textContent = "重连中";
        connBadge.classList.remove("connected");

        setTimeout(connect, 2000);
      };

      ws.onerror = () => {
        bottomStatus.textContent = "网页 WebSocket 错误";
        connBadge.textContent = "错误";
        connBadge.classList.remove("connected");
      };
    }

    function clearLog() {
      logContent.innerHTML = "";
    }

    function resetHighlight() {
      if (lastCurrentUid !== null) {
        const card = nodeMap.get(lastCurrentUid);
        if (card) {
          card.classList.remove("current");
        }
      }

      clearActivePath();

      lastCurrentUid = null;
      currentNodeEl.textContent = "-";
      currentStatusEl.textContent = "-";
    }

    function isNodeMatch(block, keyword) {
      const name = block.dataset.name.toLowerCase();
      const kind = block.dataset.kind.toLowerCase();
      const uid = block.dataset.uid;

      return (
        keyword === "" ||
        name.includes(keyword) ||
        kind.includes(keyword) ||
        uid.includes(keyword)
      );
    }

    function filterBlock(block, keyword) {
      const selfMatch = isNodeMatch(block, keyword);
      let childMatch = false;

      const childrenContainer = block.querySelector(":scope > .children");

      if (childrenContainer) {
        const childBlocks = Array.from(childrenContainer.children);

        for (const child of childBlocks) {
          if (filterBlock(child, keyword)) {
            childMatch = true;
          }
        }
      }

      const visible = selfMatch || childMatch || keyword === "";

      if (visible) {
        block.classList.remove("hidden");
      } else {
        block.classList.add("hidden");
      }

      return visible;
    }

    function filterNodes() {
      const keyword = searchBox.value.trim().toLowerCase();
      const root = nodeLayer.querySelector(":scope > .tree-node");

      if (root) {
        filterBlock(root, keyword);
      }

      if (lastCurrentUid !== null) {
        markActivePath(lastCurrentUid);
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    canvasWrap.addEventListener("wheel", () => {
      userScrolling = true;

      clearTimeout(userScrollTimer);
      userScrollTimer = setTimeout(() => {
        userScrolling = false;
      }, 1200);
    }, { passive: true });

    canvasWrap.addEventListener("mousedown", (e) => {
      if (
        e.target.tagName === "BUTTON" ||
        e.target.tagName === "INPUT" ||
        e.target.closest("button") ||
        e.target.closest("input")
      ) {
        return;
      }

      isPanning = true;
      userScrolling = true;

      panStartX = e.clientX;
      panStartY = e.clientY;
      panStartScrollLeft = canvasWrap.scrollLeft;
      panStartScrollTop = canvasWrap.scrollTop;

      canvasWrap.style.cursor = "grabbing";
      e.preventDefault();
    });

    window.addEventListener("mousemove", (e) => {
      if (!isPanning) return;

      const dx = e.clientX - panStartX;
      const dy = e.clientY - panStartY;

      canvasWrap.scrollLeft = panStartScrollLeft - dx;
      canvasWrap.scrollTop = panStartScrollTop - dy;
    });

    window.addEventListener("mouseup", () => {
      if (!isPanning) return;

      isPanning = false;
      canvasWrap.style.cursor = "grab";

      clearTimeout(userScrollTimer);
      userScrollTimer = setTimeout(() => {
        userScrolling = false;
      }, 800);
    });

    window.addEventListener("resize", () => {
      if (lastCurrentUid !== null) {
        markActivePath(lastCurrentUid);
      }
    });

    connect();
  </script>
</body>
</html>
